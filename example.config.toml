[app]
name        = "Orchestra"
env         = "development"
url         = "http://localhost:8080"
description = "Durable workflow engine with Go at the repo root and an embedded React UI."

[server]
host            = "0.0.0.0"
port            = 8080
readTimeout     = "15s"
writeTimeout    = "15s"
idleTimeout     = "60s"
shutdownTimeout = "10s"

[logging]
level  = "info"
format = "text"

[ui]
devProxyURL = "http://localhost:5173"

[workflow]
enabled                 = true
# databaseDriver = "sqlite"      # "sqlite" (default) | "postgres"
databasePath            = "data/workflows.db"    # used when databaseDriver = "sqlite"
# databaseURL = "postgres://user:pass@localhost:5432/orchestra?sslmode=disable"
#                                # used when databaseDriver = "postgres"
#                                # also settable via APP_WORKFLOW_DATABASEURL env var
#
# For PostgreSQL, tables are NOT created automatically.
# Run `orchestra schema --driver postgres --create` once after provisioning the database,
# or pipe the DDL to psql:
#   orchestra schema --driver postgres | psql "$DATABASE_URL"
pollInterval            = "1s"
leaseDuration           = "30s"
scriptEnabled           = false
scriptTimeout           = "250ms"
scriptMaxSourceBytes    = 16384
scriptMaxOutputBytes    = 262144
scriptMaxExecutionSteps = 25000
# openaiAPIKey = ""   # set via APP_WORKFLOW_OPENAI_API_KEY env var or here
                      # required for the "Enhance with AI" feature in the agent editor

[webhook]
enabled = true
# callbackAllowlist = [
#   "https://your-domain\\.example\\.com/.*",
#   "http://localhost:.*",
# ]
# Regex list of URLs allowed as X-Callback-URL on POST /ext/webhook/{id}/start
# An empty list (default) means no callback URLs are accepted.
# Set a single ".*" entry to allow any URL (dev/test only).

# External API endpoints (no authentication — plan auth separately):
#   POST /ext/webhook/{definitionId}/start   — trigger a workflow (body = JSON input)
#   POST /ext/webhook/{workflowId}/signal    — deliver a named signal
#   GET  /ext/signal/{workflowId}            — poll workflow state / pending signals
#   GET  /ext/result/{workflowId}            — poll final result (202 while running)
