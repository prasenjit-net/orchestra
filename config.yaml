app:
  name: Orchestra
  env: development
  url: http://localhost:8080
  description: Durable workflow engine with Go at the repo root and an embedded React UI.

server:
  host: 0.0.0.0
  port: 8080
  readTimeout: 15s
  writeTimeout: 15s
  idleTimeout: 60s
  shutdownTimeout: 10s

logging:
  level: info
  format: text

ui:
  devProxyURL: http://localhost:5173

workflow:
  enabled: true
  databasePath: data/workflows.db
  pollInterval: 1s
  leaseDuration: 30s
  scriptEnabled: true
  scriptTimeout: 250ms
  scriptMaxSourceBytes: 16384
  scriptMaxOutputBytes: 262144
  scriptMaxExecutionSteps: 25000
